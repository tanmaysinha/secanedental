<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Card — Secane Dental</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      background-image:
        radial-gradient(ellipse at 10% 30%, rgba(59,130,246,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(14,165,233,0.20) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 95%, rgba(37,99,235,0.15) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
    }

    .pill {
      display: inline-block;
      background: rgba(59,130,246,0.12);
      border: 1.5px solid rgba(59,130,246,0.3);
      color: #1d4ed8;
      border-radius: 9999px;
      padding: 6px 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
      width: fit-content;
    }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 80px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #0f172a;
      margin-bottom: 24px;
    }

    h1 span {
      background: linear-gradient(90deg, #1d4ed8, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 22px;
      color: #64748b;
      line-height: 1.5;
      max-width: 680px;
      margin-bottom: 40px;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    }

    .url {
      font-size: 16px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="pill">Serving the community since the 1960s</div>
  <h1>Secane<br><span>Dental</span></h1>
  <p>Quality, affordable dental care right in the neighborhood.</p>
  <div class="footer">
    <div class="dot"></div>
    <span class="url">www.secanedental.com</span>
  </div>
</body>
</html>
